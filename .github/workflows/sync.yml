name: Sync package sites

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Add or update submodules
        run: |
          repos=(
            yihui/litedown
            yihui/lt
            yihui/mime
            yihui/testit
            yihui/rolldown
            yihui/xfun
            yihui/tinyimg
            yihui/servr
            yihui/gglite
            yihui/knitr
            rstudio/rmarkdown-book
            rstudio/rmarkdown-cookbook
            rstudio/bookdown
            rstudio/blogdown
          )
          for entry in "${repos[@]}"; do
            repo="${entry##*/}"
            if [ -d "$repo" ]; then
              git submodule update --remote "$repo" || true
            else
              git submodule add -b gh-pages "https://github.com/${entry}.git" "$repo" 2>/dev/null || true
            fi
          done

      - name: Commit and push if changed
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
          else
            dirs=$(git diff --cached --name-only | cut -d/ -f1 | sort -u | tr '\n' ' ')
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "sync ${dirs% }"
            git push
          fi
